<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading Your Preset...</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>Your download is starting automatically...</h2>
    <div class="loader"></div>
    <p>Please do not close or refresh this page.</p>

    <script>
        // 1. यह कोड URL से फाइल का नाम पढ़ेगा (जैसे: ?preset=gravity)
        const urlParams = new URLSearchParams(window.location.search);
        const presetName = urlParams.get('preset');

        if (presetName) {
            // 2. यह तुम्हारे 'presets' फोल्डर का गुप्त रास्ता है
            const securePath = `./presets/${presetName}.xml`;

            // 3. बिना लिंक दिखाए फाइल डाउनलोड करने का जादू (Blob Method)
            fetch(securePath)
                .then(response => {
                    if (!response.ok) throw new Error("File not found");
                    return response.blob();
                })
                .then(blob => {
                    const blobUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = `${presetName}_preset.xml`; // फोन में डाउनलोड होने वाला नाम
                    document.body.appendChild(a);
                    a.click();
                    
                    // काम होते ही नकली लिंक को तुरंत डिलीट करना
                    window.URL.revokeObjectURL(blobUrl);
                    a.remove();
                    
                    document.querySelector('h2').innerText = "Download Successful! You can close this tab.";
                    document.querySelector('.loader').style.display = 'none';
                })
                .catch(err => {
                    document.querySelector('h2').innerText = "Error: File not found or invalid link!";
                    document.querySelector('.loader').style.display = 'none';
                });
        } else {
            document.querySelector('h2').innerText = "No preset selected.";
        }
    </script>
</body>
</html>
