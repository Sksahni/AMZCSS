<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading Your Preset - AMZCSS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #0b0c10;
            color: #ffffff;
            padding: 100px 20px;
            margin: 0;
        }
        .container {
            background: #12131c;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: inline-block;
            max-width: 400px;
            width: 100%;
            border: 1px solid #1f2029;
            box-sizing: border-box;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 30px;
            color: #ffffff;
        }
        .logo span {
            color: #ff6b2b;
        }
        h1 {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 15px;
        }
        p {
            color: #9ca3af;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        /* Loading Spinner Animation */
        .spinner {
            margin: 20px auto;
            width: 50px;
            height: 50px;
            border: 5px solid #1f2029;
            border-top: 5px solid #ff6b2b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #ff4757;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">AMZ<span>CSS</span></div>
        <div id="status-area">
            <h1>Downloading Your Preset...</h1>
            <div class="spinner"></div>
            <p>Please do not close or refresh this page. Your download will start automatically in a moment.</p>
        </div>
    </div>

    <script>
        // 1. Get the item keyword from Razorpay redirect URL (?item=...)
        const urlParams = new URLSearchParams(window.location.search);
        const item = urlParams.get('item');

        // 2. Exact Raw GitHub Links for direct download
        const fileLinks = {
            'bodyaura': 'https://raw.githubusercontent.com/Sksahni/AMZCSS/main/prestes/sell.body.aura.web.xml',
            'elvenglow': 'https://raw.githubusercontent.com/Sksahni/AMZCSS/main/prestes/AMZCSS%20ELVEN%20GLOW.xml',
            'file': 'https://raw.githubusercontent.com/Sksahni/AMZCSS/main/prestes/file.xml'
        };

        const statusArea = document.getElementById('status-area');

        // 3. Trigger auto-download if item is found
        if (item && fileLinks[item.toLowerCase()]) {
            setTimeout(() => {
                const downloadLink = document.createElement('a');
                downloadLink.href = fileLinks[item.toLowerCase()];
                downloadLink.download = ""; // Triggers native download browser behavior
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                // Update text after download triggers
                statusArea.innerHTML = `
                    <h1 style="color: #2ed573;">Download Started! 🎉</h1>
                    <p>If your download didn't start, <a href="${fileLinks[item.toLowerCase()]}" style="color: #ff6b2b; text-decoration: underline; font-weight: bold;">click here</a> to grab it directly.</p>
                `;
            }, 2000); // 2 seconds delay for a smooth professional transition
        } else {
            // Fixes the "No preset selected" error with correct design language
            statusArea.innerHTML = `
                <h1 class="error-msg">No Preset Selected!</h1>
                <p>We couldn't detect which template you purchased. Please try accessing the link directly from your payment confirmation receipt.</p>
            `;
        }
    </script>

</body>
</html>
